version: "2"
sql:
  - engine: "sqlite"
    queries: "queries.read.sql"
    schema: "db/schema.sql"
    gen:
      go:
        package: "db"
        out: "internal/db"
        emit_json_tags: true
        emit_pointers_for_null_types: true
        overrides: &overrides
          - column: "telegram_publish_notes.tag_ids"
            go_type: "trip2g/internal/model.Int64IDs"
          - column: "purchases.payment_data"
            go_type: "string"
          - column: "offers.lifetime"
            go_type: "*trip2g/internal/model.Lifetime"
          - column: "telegram_publish_sent_messages.instant"
            go_type: "bool"

  - engine: "sqlite"
    queries: "queries.write.sql"
    schema: "db/schema.sql"
    gen:
      go:
        package: "db"
        out: "internal/db"
        emit_json_tags: true
        emit_pointers_for_null_types: true
        overrides: *overrides
