- name: Setup Lottie Converter
  hosts: all
  become: yes
  vars:
    lottie_domain: ce.trip2g.com
    lottie_port: 3000
    lottie_image: alexes/lottie:v0.2
    lottie_cache_dir: /var/lib/lottie-converter/cache
    docker_install_compose: false

  roles:
    - geerlingguy.docker

  tasks:
    - name: Ensure /etc/lottie.env exists
      stat:
        path: /etc/lottie.env
      register: lottie_env_file
      failed_when: not lottie_env_file.stat.exists

    - name: Create lottie-converter cache directory
      file:
        path: "{{ lottie_cache_dir }}"
        state: directory
        mode: '0755'

    - name: Run lottie-converter container
      docker_container:
        name: lottie-converter
        image: "{{ lottie_image }}"
        state: started
        restart_policy: unless-stopped
        ports:
          - "127.0.0.1:{{ lottie_port }}:3000"
        env_file: /etc/lottie.env
        volumes:
          - "{{ lottie_cache_dir }}:/tmp/lottiecache"
        recreate: yes
