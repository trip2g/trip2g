- name: Setup Lottie Converter
  hosts: all
  become: yes
  vars:
    lottie_domain: ce.trip2g.com
    lottie_port: 3000
    lottie_image: alexes/lottie:v0.1
    lottie_cache_dir: /var/lib/lottie-converter/cache
    docker_install_compose: false
    docker_users:
      - root

  roles:
    - geerlingguy.docker

  tasks:
    - name: Ensure /etc/lottie.env exists
      stat:
        path: /etc/lottie.env
      register: lottie_env_file
      failed_when: not lottie_env_file.stat.exists

    - name: Create lottie-converter cache directory
      file:
        path: "{{ lottie_cache_dir }}"
        state: directory
        mode: '0755'

    - name: Pull lottie-converter image
      community.docker.docker_image:
        name: "{{ lottie_image }}"
        source: pull
        force_source: yes

    - name: Run lottie-converter container
      community.docker.docker_container:
        name: lottie-converter
        image: "{{ lottie_image }}"
        state: started
        restart_policy: unless-stopped
        ports:
          - "127.0.0.1:{{ lottie_port }}:3000"
        env_file: /etc/lottie.env
        volumes:
          - "{{ lottie_cache_dir }}:/app/cache"
        recreate: yes

    - name: Deploy traefik/dynamic.yml config with lottie-converter
      template:
        src: traefik_dynamic.yml.j2
        dest: /etc/traefik/dynamic.yml
        owner: traefik
        group: traefik
        mode: '0644'
      notify: Restart traefik

  handlers:
    - name: Restart traefik
      systemd:
        name: traefik
        state: restarted
