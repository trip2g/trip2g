- name: Setup
  hosts: all
  become: yes
  tags: app
  vars:
    app_dir: /opt/trip2g
    app_user: trip2g
    app_group: trip2g
    bin_path: "{{ app_dir }}/bin/app"
    data_dir: "{{ app_dir }}/data"
    trip2g_services:
      - { service_name: trip2g, listen_addr: "localhost:8081", domain: "demo.trip2g.com" }
      # - { service_name: trip2g_mbti, listen_addr: "localhost:8082", domain: "mbti.trip2g.com" }
      - { service_name: trip2g_taro, listen_addr: "localhost:8083", domain: "taro.trip2g.com" }
      - { service_name: trip2g_secondbrain, listen_addr: "localhost:8085", domain: "secondbrain.trip2g.com" }
  tasks:
    - name: Create trip2g user
      user:
        name: "{{ app_user }}"
        system: yes
        shell: /usr/sbin/nologin
        create_home: no

    - name: Create writable data dir
      file:
        path: "{{ data_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: '0750'

    - name: Download Litestream
      get_url:
        url: https://github.com/benbjohnson/litestream/releases/download/v0.3.13/litestream-v0.3.13-linux-amd64.deb
        dest: /tmp/litestream-v0.3.13-linux-amd64.deb
        mode: '0644'

    - name: Install Litestream
      apt:
        deb: /tmp/litestream-v0.3.13-linux-amd64.deb
        state: present

    - name: Upload Litestream config generator script
      copy:
        src: generate-litestream-config.sh
        dest: /usr/local/bin/generate-litestream-config.sh
        mode: '0755'
        owner: root
        group: root

    - name: Deploy Litestream systemd service
      copy:
        src: litestream.service
        dest: /etc/systemd/system/litestream.service
        mode: '0644'
      notify:
        - Reload systemd
        - Restart litestream

    - name: Install UFW
      apt:
        name: ufw
        state: present

    - name: Configure UFW defaults
      ufw:
        direction: "{{ item.direction }}"
        policy: "{{ item.policy }}"
      loop:
        - { direction: 'incoming', policy: 'deny' }
        - { direction: 'outgoing', policy: 'allow' }

    - name: Allow SSH (port 22)
      ufw:
        rule: allow
        port: "22"
        proto: tcp
        comment: "SSH"

    - name: Allow HTTP (port 80)
      ufw:
        rule: allow
        port: "80"
        proto: tcp
        comment: "HTTP"

    - name: Allow HTTPS (port 443)
      ufw:
        rule: allow
        port: "443"
        proto: tcp
        comment: "HTTPS"

    - name: Enable UFW
      ufw:
        state: enabled

    - name: Create app directory
      file:
        path: "{{ app_dir }}"
        state: directory
        mode: '0755'

    - name: Upload app binary
      notify:
        - Reload systemd
        - Restart service
      copy:
        src: ../tmp/amd64
        dest: "{{ app_dir }}/bin/app"
        owner: root
        group: root
        mode: '0755'

    - name: Generate systemd unit
      notify:
        - Reload systemd
        - Restart service
      template:
        src: service.j2
        dest: "/etc/systemd/system/{{ item.service_name }}.service"
        mode: '0644'
      loop: "{{ trip2g_services }}"

    - name: Enable and start service
      systemd:
        name: "{{ item.service_name }}"
        enabled: yes
        state: started
      loop: "{{ trip2g_services }}"

    - name: Enable and start Litestream service
      systemd:
        name: litestream
        enabled: yes
        state: started
        daemon_reload: yes

    - name: Deploy traefik/dynamic.yml config
      template:
        src: traefik_dynamic.yml.j2
        dest: /etc/traefik/dynamic.yml
        owner: traefik
        group: traefik
        mode: '0644'

  handlers:
    - name: Reload systemd
      command: systemctl daemon-reload

    - name: Restart service
      systemd:
        name: "trip2g"
        state: restarted

    # - name: Restart service
    #   systemd:
    #     name: "trip2g_mbti"
    #     state: restarted

    - name: Restart service
      systemd:
        name: "trip2g_taro"
        state: restarted

    - name: Restart service
      systemd:
        name: "trip2g_secondbrain"
        state: restarted

    - name: Restart litestream
      systemd:
        name: litestream
        state: restarted

- name: Setup Treafik
  hosts: all
  become: yes
  tags: traefik
  handlers:
  - name: Reload systemd
    command: systemctl daemon-reload

  - name: Restart traefik
    systemd:
      name: traefik
      state: restarted
  tasks:
  - name: Ensure traefik group exists
    group:
      name: traefik
      system: yes

  - name: Ensure traefik user exists
    user:
      name: traefik
      group: traefik
      shell: /usr/sbin/nologin
      system: yes
      create_home: no

  - name: Create config directories
    file:
      path: "{{ item }}"
      state: directory
      owner: traefik
      group: traefik
      mode: '0750'
    loop:
      - /etc/traefik
      - /var/lib/traefik

  - name: Download Traefik v3.4.3
    get_url:
      url: https://github.com/traefik/traefik/releases/download/v3.4.3/traefik_v3.4.3_linux_amd64.tar.gz
      dest: /tmp/traefik_v3.4.3_linux_amd64.tar.gz
      mode: '0644'

  - name: Verify Traefik SHA256
    ansible.builtin.shell: |
      echo "be2f306b47d0070f420cbf7c081357abeb9c43ddceda68eadd171bc8ec7e7fa5  /tmp/traefik_v3.4.3_linux_amd64.tar.gz" | sha256sum -c -
    register: sha_check
    changed_when: false
    failed_when: "'OK' not in sha_check.stdout"

  - name: Extract Traefik binary
    unarchive:
      src: /tmp/traefik_v3.4.3_linux_amd64.tar.gz
      dest: /usr/local/bin
      remote_src: yes
      mode: '0755'

  - name: Create acme.json
    copy:
      dest: /etc/traefik/acme.json
      content: ''
      owner: traefik
      group: traefik
      mode: '0600'

  - name: Deploy traefik.yml config
    template:
      src: traefik.yml.j2
      dest: /etc/traefik/traefik.yml
      owner: traefik
      group: traefik
      mode: '0644'
    notify: Restart traefik

  - name: Deploy Traefik systemd unit
    copy:
      dest: /etc/systemd/system/traefik.service
      content: |
        [Unit]
        Description=Traefik v3
        After=network.target

        [Service]
        User=traefik
        Group=traefik
        ExecStart=/usr/local/bin/traefik --configFile=/etc/traefik/traefik.yml
        Restart=always
        CapabilityBoundingSet=CAP_NET_BIND_SERVICE
        AmbientCapabilities=CAP_NET_BIND_SERVICE

        [Install]
        WantedBy=multi-user.target
      mode: '0644'
    notify: Reload systemd

  - name: Enable and start Traefik
    systemd:
      name: traefik
      enabled: yes
      state: started
