- name: Setup
  hosts: all
  become: yes
  vars:
    app_dir: /opt/trip2g
    app_user: trip2g
    app_group: trip2g
    service_name: trip2g
    bin_path: "{{ app_dir }}/bin/app"
    data_dir: "{{ app_dir }}/data"
  tasks:
    - name: Create trip2g user
      user:
        name: "{{ app_user }}"
        system: yes
        shell: /usr/sbin/nologin
        create_home: no

    - name: Create writable data dir
      file:
        path: "{{ data_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: '0750'

    - name: Download Litestream
      get_url:
        url: https://github.com/benbjohnson/litestream/releases/download/v0.3.13/litestream-v0.3.13-linux-amd64.deb
        dest: /tmp/litestream-v0.3.13-linux-amd64.deb
        mode: '0644'

    - name: Install Litestream
      apt:
        deb: /tmp/litestream-v0.3.13-linux-amd64.deb
        state: present

    - name: Upload Litestream config generator script
      copy:
        src: generate-litestream-config.sh
        dest: /usr/local/bin/generate-litestream-config.sh
        mode: '0755'
        owner: root
        group: root

    - name: Deploy Litestream systemd service
      copy:
        src: litestream.service
        dest: /etc/systemd/system/litestream.service
        mode: '0644'
      notify:
        - Reload systemd
        - Restart litestream

    - name: Enable and start Litestream service
      systemd:
        name: litestream
        enabled: yes
        state: started
        daemon_reload: yes

    - name: Create app directory
      file:
        path: "{{ app_dir }}"
        state: directory
        mode: '0755'

    - name: Upload app binary
      notify:
        - Reload systemd
        - Restart service
      copy:
        src: ../tmp/amd64
        dest: "{{ app_dir }}/bin/app"
        owner: root
        group: root
        mode: '0755'

    - name: Generate systemd unit
      notify:
        - Reload systemd
        - Restart service
      template:
        src: service.j2
        dest: "/etc/systemd/system/{{ service_name }}.service"
        mode: '0644'

    - name: Enable and start service
      systemd:
        name: "{{ service_name }}"
        enabled: yes
        state: started

  handlers:
    - name: Reload systemd
      command: systemctl daemon-reload

    - name: Restart service
      systemd:
        name: "{{ service_name }}"
        state: restarted

    - name: Restart litestream
      systemd:
        name: litestream
        state: restarted
