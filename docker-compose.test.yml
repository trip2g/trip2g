name: trip2g_test_env

services:
  minio:
    image: minio/minio:latest
    container_name: trip2g-test-minio
    network_mode: host
    environment:
      MINIO_ROOT_USER: testuser
      MINIO_ROOT_PASSWORD: testpassword
    command: server /data --console-address ":29001" --address ":29000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:29000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
      # На ARM Linux: нативно arm64
      # На CI x64: нативно amd64
      # Docker автоматически выбирает правильную архитектуру
    container_name: trip2g-test-app
    depends_on:
      minio:
        condition: service_healthy
    network_mode: host
    environment:
      # Server
      - LISTEN_ADDR=:20081
      - INTERNAL_LISTEN_ADDR=:20082
      - DB_FILE=/data/test.sqlite3
      - DEV=true # sign in code 000000
      - LOG_LEVEL=debug
      - OWNER_EMAIL=hello@example.com
      - SHUTDOWN_GRACE_PERIOD=1ms
      - SHUTDOWN_TIMEOUT=1ms

      # MinIO
      - MINIO_ENDPOINT=localhost:29000
      - MINIO_ACCESS_KEY_ID=testuser
      - MINIO_SECRET_KEY=testpassword
      - MINIO_BUCKET=test-bucket
      - MINIO_USE_SSL=false

      # Public URL
      # - PUBLIC_URL=http://localhost:20081
      - PUBLIC_URL=https://trip2g.com # for telegram links

      # JWT (test secret - НЕ использовать в продакшене!)
      - JWT_SECRET=test-secret-key-for-testing-only-do-not-use-in-production
      - USER_TOKEN_COOKIE_NAME=trip2g_e2e # avoid conflicts with dev cookies

      # Git API (using test vault)
      - GIT_API_REPO_PATH=/app/testdata/vault
      - GIT_API_BASE_PATH=/git

      # Email (mock for tests)
      - RESEND_API_KEY=test-key
      - MAIL_FROM=test@example.com
    volumes:
      - ./tmp/data:/data
      - ./testdata/vault:/app/testdata/vault:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:20082/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  test-data:
