{{ define "content" }}

<h1 class="text-2xl font-bold">{{ .page.Title }}</h1>

{{ .page.HTML }}

{{ if .page.InLinks }}
  <h2 class="font-bold mt-4">Linked from</h2>

  {{ range $k, $v := .page.InLinks }}
    {{ with (getPage $k) }}
      <div><a href="{{ .Permalink }}">{{ .Title }}</a></div>
    {{ end }}
  {{ end }}

{{ end }}

{{ end }}
