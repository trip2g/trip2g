{{ define "content" }}

<h1 class="text-2xl font-bold">{{ .page.Title }}</h1>

<div class="prose">
{{ .page.HTML }}
</div>

{{ if .page.InLinks }}
  <h2 class="font-bold mt-4">Linked from</h2>

  {{ range $k, $v := .page.InLinks }}
    {{ with (getPage $k) }}
      <div><a class="{{ getPageLinkClasses $k }}" href="{{ .Permalink }}">{{ .Title }}</a></div>
    {{ end }}
  {{ end }}

{{ end }}

{{ if (not .isGuest) }}
<form action="/_system/signout" method="post">
  <button type="submit" class="mt-4">Sign out</button>
</form>
{{ end }}

{{ end }}
